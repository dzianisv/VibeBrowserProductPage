name: Website CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run build

  agentlabs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/agentlabs/package-lock.json
      - run: npm ci
      - run: npm ci --prefix apps/agentlabs
      - run: npm audit --omit=dev --audit-level=high --prefix apps/agentlabs
      - run: npm run lint --prefix apps/agentlabs
      - run: npm run build --prefix apps/agentlabs

  opencode-mobile-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: OpenCodeMobileSite/package-lock.json
      - run: npm ci --prefix OpenCodeMobileSite
      - run: npm audit --omit=dev --audit-level=high --prefix OpenCodeMobileSite
      - run: npm run lint --prefix OpenCodeMobileSite
      - run: npm run build --prefix OpenCodeMobileSite
