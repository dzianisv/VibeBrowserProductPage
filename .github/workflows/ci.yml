name: Website CI

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: website-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  root-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      # Source-string regression guard for the pricing value-clarity copy
      # (per-tier cloud-AI usage caps, reset wording, CWS trust link, and the
      # no-numeric-rating / no-aggregateRating guarantees). Reads source only,
      # so it doesn't need the build.
      - run: node scripts/test-pricing-value-clarity.js
      - run: npm run build

  agentlabs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/agentlabs/package-lock.json
      - run: npm ci
      - run: npm ci --prefix apps/agentlabs
      - run: npm audit --omit=dev --audit-level=high --prefix apps/agentlabs
      - run: npm run lint --prefix apps/agentlabs
      - run: npm run build --prefix apps/agentlabs

  install-nonce-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Ensure Puppeteer's bundled Chromium is present in the CI cache dir.
      - run: npx puppeteer browsers install chrome
      - run: npm run build
      # Real-browser E2E for the /install gtag.js -> nonce handoff (issue #1546):
      # spawns `next start` against the production build, drives real Chromium via
      # Puppeteer, loads the site's real gtag.js, and asserts the cold-start
      # client_id -> nonce flow + same-origin protection. Exits non-zero on any
      # failed assertion, which fails this required check. The only mocked boundary
      # is PR #1551's relay, stood up locally via ANALYTICS_API_BASE inside the script.
      - run: node scripts/test-install-nonce.cjs

  opencode-mobile-site:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: OpenCodeMobileSite/package-lock.json
      - run: npm ci --prefix OpenCodeMobileSite
      - run: npm audit --omit=dev --audit-level=high --prefix OpenCodeMobileSite
      - run: npm run lint --prefix OpenCodeMobileSite
      - run: npm run build --prefix OpenCodeMobileSite

  pricing-responsive-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: true
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      # Ensure Puppeteer's bundled Chromium is present in the CI cache dir.
      - run: npx puppeteer browsers install chrome
      - run: npm run build
      # Real-browser rendered/responsive check for the /pricing route: spawns
      # `next start` against the production build and drives real Chromium via
      # Puppeteer at three viewports (mobile 375, tablet 768, desktop 1440),
      # asserting no horizontal overflow plus that the three per-tier cloud-AI
      # usage-cap lines, the CWS trust link, and the reset-wording footnote are
      # present, not hidden, and scrollable into view. Exits non-zero on any
      # failed assertion, which fails this required check.
      - run: node scripts/test-pricing-responsive.cjs
