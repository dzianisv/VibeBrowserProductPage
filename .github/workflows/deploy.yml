name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    steps:
      - name: Deploy via Vercel git-source API
        run: |
          RESPONSE=$(curl -s -X POST \
            "https://api.vercel.com/v13/deployments?teamId=${{ secrets.VERCEL_ORG_ID }}&forceNew=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"vibebrowser.app\",
              \"project\": \"${{ secrets.VERCEL_PROJECT_ID }}\",
              \"target\": \"production\",
              \"gitSource\": {
                \"type\": \"github\",
                \"org\": \"${{ github.repository_owner }}\",
                \"repo\": \"${{ github.event.repository.name }}\",
                \"ref\": \"main\",
                \"sha\": \"${{ github.sha }}\"
              }
            }")

          DEPLOY_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))")
          DEPLOY_URL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('url',''))")

          if [ -z "$DEPLOY_ID" ]; then
            echo "Failed to create deployment:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Deployment ID: $DEPLOY_ID"
          echo "Preview URL: $DEPLOY_URL"

          # Poll until ready
          for i in $(seq 1 30); do
            sleep 15
            STATUS=$(curl -s \
              "https://api.vercel.com/v13/deployments/$DEPLOY_ID?teamId=${{ secrets.VERCEL_ORG_ID }}" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('readyState',''))")
            echo "[$i] $STATUS"
            if [ "$STATUS" = "READY" ]; then
              echo "deployment_url=https://$DEPLOY_URL" >> $GITHUB_OUTPUT
              echo "Deployed: https://www.vibebrowser.app"
              exit 0
            elif [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
          done

          echo "Timed out waiting for deployment"
          exit 1
        id: deploy
