name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Remove large video files from build output
        run: find .vercel/output -name "*.mp4" -o -name "*.webm" | xargs rm -f

      - name: Cancel stale Vercel deployments
        run: |
          DEPS=$(curl -sf "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&state=BUILDING,QUEUED&limit=20" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import json,sys; [print(d['uid']) for d in json.load(sys.stdin).get('deployments',[])]")
          for DEP in $DEPS; do
            echo "Cancelling $DEP"
            curl -sf -X PATCH "https://api.vercel.com/v12/deployments/$DEP/cancel" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" -H "Content-Type: application/json" || true
          done

      - name: Deploy to Vercel Production
        run: |
          OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployment URL: $OUTPUT"
          echo "deployment_url=$OUTPUT" >> $GITHUB_OUTPUT
        id: deploy

      - name: Comment deployment URL on commit
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '✅ Deployed to production: ${{ steps.deploy.outputs.deployment_url }}'
            })

  deploy-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Remove large video files from build output
        run: find .vercel/output -name "*.mp4" -o -name "*.webm" | xargs rm -f

      - name: Cancel stale Vercel deployments
        run: |
          DEPS=$(curl -sf "https://api.vercel.com/v6/deployments?projectId=$VERCEL_PROJECT_ID&teamId=$VERCEL_ORG_ID&state=BUILDING,QUEUED&limit=20" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            | python3 -c "import json,sys; [print(d['uid']) for d in json.load(sys.stdin).get('deployments',[])]")
          for DEP in $DEPS; do
            echo "Cancelling $DEP"
            curl -sf -X PATCH "https://api.vercel.com/v12/deployments/$DEP/cancel" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" -H "Content-Type: application/json" || true
          done

      - name: Deploy to Vercel Preview
        run: |
          OUTPUT=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "Preview URL: $OUTPUT"
          echo "preview_url=$OUTPUT" >> $GITHUB_OUTPUT
        id: deploy

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🔍 Preview deployment: ${{ steps.deploy.outputs.preview_url }}'
            })
