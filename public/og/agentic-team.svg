  <!-- Subtitle -->
  <text x="550" y="380" fill="#9aa0a6" font-size="22" font-family="Inter, Arial, sans-serif" text-anchor="middle">Autonomous AI Ops Team for Your SaaS</text>

  <!-- Bottom tagline -->
  <text x="550" y="440" fill="#8ab4f8" font-size="17" font-family="Inter, Arial, sans-serif" text-anchor="middle">5 AI agents coordinating over Slack · Powered by OpenClaw</text>

  <!-- URL -->
  <text x="550" y="500" fill="#5f6368" font-size="15" font-family="Inter, Arial, sans-serif" text-anchor="middle">vibebrowser.app/agentic-team</text>
