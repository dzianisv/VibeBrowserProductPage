<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Vibe Agentic Team - Autonomous AI Ops Team">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#1a1a2e" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="80" y="80" width="1040" height="470" rx="24" fill="rgba(26, 26, 26, 0.85)" stroke="#2a2a2a" stroke-width="1" />

  <!-- Agent avatars row -->
  <circle cx="320" cy="195" r="30" fill="#81c995" />
  <text x="320" y="205" fill="#0a0a0a" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700" text-anchor="middle">G</text>

  <circle cx="435" cy="195" r="30" fill="#8ab4f8" />
  <text x="435" y="205" fill="#0a0a0a" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700" text-anchor="middle">A</text>

  <circle cx="550" cy="195" r="30" fill="#fdd663" />
  <text x="550" y="205" fill="#0a0a0a" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700" text-anchor="middle">E</text>

  <circle cx="665" cy="195" r="30" fill="#c58af9" />
  <text x="665" y="205" fill="#0a0a0a" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700" text-anchor="middle">J</text>

  <circle cx="780" cy="195" r="30" fill="#f28b82" />
  <text x="780" y="205" fill="#0a0a0a" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700" text-anchor="middle">S</text>

  <!-- Agent labels -->
  <text x="320" y="248" fill="#9aa0a6" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">Support</text>
  <text x="435" y="248" fill="#9aa0a6" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">Engineer</text>
  <text x="550" y="248" fill="#9aa0a6" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">Release</text>
  <text x="665" y="248" fill="#9aa0a6" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">Product</text>
  <text x="780" y="248" fill="#9aa0a6" font-size="12" font-family="Inter, Arial, sans-serif" text-anchor="middle">Marketing</text>

  <!-- Title -->
